name: Build Nettumi Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Project and Keystore
        run: |
          # ১. অ্যান্ড্রয়েড সোর্স কোড আনজিপ করা
          unzip Nettumi-Android-Fixed.zip
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          cp -r $PROJ_DIR/* . || true
          
          # ২. আপনার ছোট হাতের অক্ষরের জিপ ফাইলটি আনজিপ করা
          unzip nettumi-keystore.zip
          
          # ৩. ভেতরে থাকা .keystore ফাইলটি খুঁজে বের করা এবং রিনেম করা
          mv *.keystore nettumi.keystore || true
          
          # ৪. Gradle Wrapper ফিক্স করা যেন এরর না আসে
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Verify Keystore File
        run: |
          if [ -f "nettumi.keystore" ]; then
            echo "Keystore is ready for signing!"
          else
            echo "Error: nettumi.keystore not found inside the zip. Please check the file inside zip."
            exit 1
          fi

      - name: Build and Sign Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/nettumi.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Release-APK
          path: app/build/outputs/apk/release/*.apk
