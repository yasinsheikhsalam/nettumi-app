name: 🚀 FINAL ABSOLUTE SOLUTION - Ultra Power Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild?'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.24.6'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: apk
            artifact_name: "Nettumi-Release-APK"
          - target: aab
            artifact_name: "Nettumi-Release-AAB"

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🦋 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            \~/.pub-cache
            \~/.gradle/caches
            extracted/SourceFixed/.dart_tool
          key: \( {{ runner.os }}-flutter- \){{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-

      # ================== SOURCE & KEYSTORE EXTRACTION ==================
      - name: 💣 NUCLEAR EXTRACTION & KEYSTORE
        run: |
          mkdir -p extracted/SourceFixed/android/app
          
          if [ -f "Nettumi-Adda-Source-Fixed-v11.zip" ]; then
            unzip -q "Nettumi-Adda-Source-Fixed-v11.zip" -d extracted/
          else
            echo "❌ Source ZIP not found!"
            exit 1
          fi
          
          if [ -f "nettumi-keystore.zip" ]; then
            unzip -q "nettumi-keystore.zip" -d temp_ks
            find temp_ks -name "*.keystore" -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;
            echo "✅ Keystore extracted"
          else
            echo "⚠️ Keystore not found - continuing with debug mode"
          fi

      # ================== ULTRA NUCLEAR FIX ==================
      - name: 🧬 ULTRA NUCLEAR FIX
        run: |
          cat > /tmp/fix.py << 'EOF'
          import os, glob, re
          ROOT = './extracted/SourceFixed'
          def log(m): print("🔧", m)

          # pubspec fix
          if os.path.exists(f'{ROOT}/pubspec.yaml'):
              with open(f'{ROOT}/pubspec.yaml', 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              clean = []
              seen = set()
              for line in lines:
                  s = line.strip()
                  if s.startswith('dependencies:'):
                      clean.append(line)
                      continue
                  if s.startswith('  ') and ':' in s and not s.startswith('  #'):
                      dep = s.split(':')[0].strip()
                      if dep not in seen:
                          seen.add(dep)
                          clean.append(line)
                      continue
                  clean.append(line)
              clean.append('\ndependency_overrides:\n  intl: ^0.19.0\n  collection: ^1.19.0\n')
              with open(f'{ROOT}/pubspec.yaml', 'w', encoding='utf-8') as f:
                  f.writelines(clean)
              log("pubspec.yaml fixed")

          # Gradle fixes
          for f in glob.glob(f'{ROOT}/**/*gradle*', recursive=True):
              if not os.path.isfile(f): continue
              with open(f, 'r', encoding='utf-8', errors='ignore') as ff:
                  c = ff.read()
              c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', c)
              c = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', c)
              c = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 21', c)
              with open(f, 'w', encoding='utf-8') as ff:
                  ff.write(c)
              log(f"Fixed: {f}")

          # key.properties
          kp = f'{ROOT}/android/key.properties'
          if not os.path.exists(kp):
              with open(kp, 'w') as f:
                  f.write("storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n")
              log("key.properties created")
          EOF
          python3 /tmp/fix.py

      # ================== BUILD STEP (সবচেয়ে গুরুত্বপূর্ণ - সহজ করা হয়েছে) ==================
      - name: 🏗️ Build ${{ matrix.target }}
        working-directory: ./extracted/SourceFixed
        run: |
          flutter clean
          flutter pub get || flutter pub get

          if [ "${{ matrix.target }}" = "apk" ]; then
            flutter build apk --release --no-tree-shake-icons
            cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-APK-Success.apk
          else
            flutter build appbundle --release
            cp build/app/outputs/bundle/release/app-release.aab ../../Nettumi-AAB-Success.aab
          fi

          ls -la ../../Nettumi-*

      # ================== UPLOAD ARTIFACT ==================
      - name: 📤 Upload ${{ matrix.artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: Nettumi-*-Success.*
          retention-days: 30

      - name: 🎉 Success Message
        if: success()
        run: echo "✅ Build Successful for ${{ matrix.target }} ! Artifact ready."
