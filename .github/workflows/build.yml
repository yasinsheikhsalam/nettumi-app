name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Advanced Extraction & Path Fix
        run: |
          # সোর্স কোড জিপ ফাইল খুঁজে বের করা (keystore বাদ দিয়ে)
          SOURCE_ZIP=$(ls *.zip | grep -v "keystore" | head -n 1)
          if [ -z "$SOURCE_ZIP" ]; then echo "Source ZIP not found"; exit 1; fi
          unzip -q "$SOURCE_ZIP" -d extracted
          
          # pubspec.yaml এর অবস্থান অনুযায়ী রুট পাথ ডিটেক্ট করা
          REAL_SOURCE=$(find $(pwd)/extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "SOURCE_PATH=$REAL_SOURCE" >> $GITHUB_ENV

      - name: Extract Keystore
        run: |
          # Keystore জিপ থেকে ফাইল বের করে সঠিক স্থানে রাখা
          KEYSTORE_ZIP=$(ls *keystore*.zip | head -n 1)
          if [ ! -z "$KEYSTORE_ZIP" ]; then
            unzip -q "$KEYSTORE_ZIP" -d keystore_temp
            mkdir -p ${{ env.SOURCE_PATH }}/android/app/
            find keystore_temp -name "*.keystore" -o -name "*.jks" -exec cp {} ${{ env.SOURCE_PATH }}/android/app/nettumi.keystore \;
          fi

      - name: Configure Signing & Environment
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          CONF_DIR=${{ env.SOURCE_PATH }}/android
          
          # সাইনিং প্রোপার্টিজ এবং লোকাল পাথ সেট করা
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > $CONF_DIR/key.properties
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_SDK_PATH" "$ANDROID_SDK_ROOT" > $CONF_DIR/local.properties
          chmod +x $CONF_DIR/gradlew

      - name: StartApp SDK & Maven Fix
        working-directory: ${{ env.SOURCE_PATH }}/android
        run: |
          # StartApp এর জন্য Maven রিপোজিটরি অটো-ইনজেক্ট করা
          sed -i '/repositories {/a \        maven { url "https://artifact.startapp.com/releases" }' build.gradle

      - name: Flutter Dependencies
        working-directory: ${{ env.SOURCE_PATH }}
        run: |
          flutter pub cache clean
          flutter pub get || flutter pub upgrade

      - name: Build Signed APK
        working-directory: ${{ env.SOURCE_PATH }}
        run: |
          # ক্লিন বিল্ড নিশ্চিত করা
          flutter clean
          flutter build apk --release --build-name=2.0.0 --build-number=2 --no-shrink

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-v3-Final
          path: ${{ env.SOURCE_PATH }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Failure Debugging
        if: failure()
        run: |
          echo "=== Error Analysis ==="
          cd ${{ env.SOURCE_PATH }}/android && ./gradlew assembleRelease --stacktrace 2>&1 | tail -300
