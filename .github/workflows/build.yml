name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Extract Project
        run: |
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          chmod +x extracted/Source/android/gradlew

      - name: Configure Signing & local.properties
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          SOURCE_DIR=$(pwd)/extracted/Source
          KEYSTORE_PATH=$SOURCE_DIR/android/app/nettumi.keystore

          # key.properties — NO leading spaces (important!)
          cat > $SOURCE_DIR/android/key.properties <<EOF
storePassword=Nettumi@123
keyPassword=Nettumi@123
keyAlias=nettumi_alias
storeFile=$KEYSTORE_PATH
EOF

          # local.properties
          cat > $SOURCE_DIR/android/local.properties <<EOF
flutter.sdk=$FLUTTER_SDK_PATH
sdk.dir=$ANDROID_SDK_ROOT
EOF

          echo "FLUTTER_ROOT=$FLUTTER_SDK_PATH" >> $GITHUB_ENV
          echo "SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_ENV

          echo "=== local.properties ==="
          cat $SOURCE_DIR/android/local.properties
          echo "=== key.properties ==="
          cat $SOURCE_DIR/android/key.properties
          echo "=== Keystore exists? ==="
          ls -la $KEYSTORE_PATH || echo "KEYSTORE NOT FOUND!"

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install NDK
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" || true

      - name: Flutter pub get
        working-directory: extracted/Source
        run: |
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Build Signed APK
        working-directory: extracted/Source
        run: |
          flutter build apk --release \
            --build-name=2.0.0 \
            --build-number=2 \
            --no-shrink

      - name: Show full Gradle error
        if: failure()
        run: |
          echo "=== Flutter version ==="
          flutter --version
          echo "=== Dart version ==="
          dart --version
          echo "=== local.properties ==="
          cat extracted/Source/android/local.properties || echo "NOT FOUND"
          echo "=== key.properties ==="
          cat extracted/Source/android/key.properties || echo "NOT FOUND"
          echo "=== Keystore check ==="
          ls -la extracted/Source/android/app/nettumi.keystore || echo "KEYSTORE MISSING"
          echo "=== pubspec.lock (top 30) ==="
          head -30 extracted/Source/pubspec.lock || echo "NOT FOUND"
          echo "=== Gradle stacktrace ==="
          cd extracted/Source/android && ./gradlew assembleRelease --stacktrace --info 2>&1 | tail -200

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-v2-APK
          path: extracted/Source/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload APK (on failure fallback check)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            extracted/Source/android/app/build/outputs/
            extracted/Source/pubspec.lock
          if-no-files-found: ignore
