name: FINAL ABSOLUTE SOLUTION

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - name: Force Extraction & Keystore
        run: |
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          mkdir -p extracted/SourceFixed/android/app
          unzip -q nettumi-keystore.zip -d temp_ks || true
          find temp_ks -name "*" -type f -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;

      - name: The Nuclear Fix (Python)
        run: |
          cat > /tmp/nuclear_fix.py << 'EOF'
          import os, glob

          # ১. pubspec.yaml পুরোপুরি নতুন করে সাজানো (ডুপ্লিকেট এরর চিরতরে বন্ধ)
          pub_path = './extracted/SourceFixed/pubspec.yaml'
          if os.path.exists(pub_path):
              with open(pub_path, 'r') as f: lines = f.readlines()
              new_content = []
              for line in lines:
                  if 'dependency_overrides:' in line: break
                  new_content.append(line)
              new_content.append("\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n  flutter_svg: ^2.0.10+1\n")
              with open(pub_path, 'w') as f: f.writelines(new_content)

          # ২. সব বিল্ড ফাইল একবারে ফিক্স
          def fix_file(p):
              if not os.path.isfile(p): return
              with open(p, 'r', errors='ignore') as f: c = f.read()
              import re
              c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', c)
              c = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', c)
              c = re.sub(r'JavaVersion\.VERSION_1_[781]', 'JavaVersion.VERSION_17', c)
              if 'dependencies {' in c and 'androidx.media' not in c:
                  c = c.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)
              with open(p, 'w') as f: f.write(c)

          for g in glob.glob("./extracted/**/build.gradle", recursive=True): fix_file(g)
          for g in glob.glob(os.path.expanduser("~/.pub-cache") + "/**/build.gradle", recursive=True): fix_file(g)
          EOF
          python3 /tmp/nuclear_fix.py

      - name: Build and Deliver
        run: |
          cd extracted/SourceFixed
          # কি-স্টোর সেটআপ
          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n" > android/key.properties
          
          # বিল্ড প্রসেস
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          
          cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-Final-Success.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Download-Your-App-Here
          path: Nettumi-Final-Success.apk
