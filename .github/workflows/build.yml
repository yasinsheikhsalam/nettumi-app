Name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      - name: Prepare Project and Keystore
        run: |
          # ১. সোর্স কোড আনজিপ করা
          unzip Nettumi-Adda-Source.zip -d extracted
          
          # ২. আপনার ছোট হাতের অক্ষরের কী-স্টোর জিপটি আনজিপ করা
          unzip nettumi-keystore.zip
          
          # ৩. কী-স্টোর ফাইলটি সঠিক জায়গায় রিনেম করে নেওয়া
          mv *.keystore nettumi.keystore || true

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: flutter pub get

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter build apk --release --no-shrink \
          --build-name=1.0.0 --build-number=1 \
          --dart-define=KEYSTORE_PATH=$(pwd)/../../nettumi.keystore \
          --dart-define=KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
          --dart-define=KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
          --dart-define=KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
