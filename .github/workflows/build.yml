name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.0
          channel: stable

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Unzip Source Code
        run: unzip Nettumi-Adda-Source.zip -d extracted

      - name: Unzip Keystore
        run: |
          unzip nettumi-keystore.zip
          mv *.keystore nettumi.keystore || true
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/nettumi.keystore

      - name: Create key.properties
        run: |
          cat > extracted/nettumi_adda_full/android/key.properties << KEYEOF
          storePassword=Nettumi@123
          keyPassword=Nettumi@123
          keyAlias=nettumi_alias
          storeFile=nettumi.keystore
          KEYEOF

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: flutter pub get

      - name: Generate routes
        working-directory: extracted/nettumi_adda_full
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        run: flutter build apk --release --no-shrink --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
