name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Extract Project
        run: |
          sudo apt-get install -y unzip
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted
          ls extracted/SourceFixed/

      - name: Extract Keystore
        run: |
          unzip -q nettumi-keystore.zip -d keystore_out
          KEYSTORE_SRC=$(find keystore_out -type f \( -name "*.keystore" -o -name "*.jks" \) | head -1)
          cp "$KEYSTORE_SRC" extracted/SourceFixed/android/app/nettumi.keystore

      - name: Configure signing & properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          SRC=$GITHUB_WORKSPACE/extracted/SourceFixed
          KS_PATH=$SRC/android/app/nettumi.keystore
          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=%s\n" "$KS_PATH" > $SRC/android/key.properties
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_SDK" "$ANDROID_SDK_ROOT" > $SRC/android/local.properties
          chmod +x $SRC/android/gradlew

      - name: Fix pubspec & pub get
        run: |
          cd $GITHUB_WORKSPACE/extracted/SourceFixed
          sed -i 's/flutter_svg:.*/flutter_svg: ^2.0.10+1/' pubspec.yaml
          sed -i 's/url_launcher:.*/url_launcher: ^6.2.5/' pubspec.yaml
          sed -i 's/flutter_lints:.*/flutter_lints: ^3.0.0/' pubspec.yaml
          grep -q "dependency_overrides:" pubspec.yaml || printf '\ndependency_overrides:\n  intl: ^0.20.0\n  collection: ^1.19.0\n' >> pubspec.yaml
          rm -f pubspec.lock
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create auto-fix Python script
        run: |
          cat > /tmp/fix_gradle.py << 'EOF'
          import os
          import re
          import sys
          import glob

          def fix_gradle(bg):
              if not os.path.isfile(bg):
                  return
              pkg = os.path.basename(os.path.dirname(os.path.dirname(bg)))
              print(f"Fixing: {pkg}")

              with open(bg, 'r', errors='ignore') as f:
                  content = f.read()

              content = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', content)

              if 'namespace' not in content and 'android {' in content:
                  manifest = os.path.join(os.path.dirname(bg), 'src', 'main', 'AndroidManifest.xml')
                  ns = ''
                  if os.path.isfile(manifest):
                      m = re.search(r'package="([^"]+)"', open(manifest, errors='ignore').read())
                      if m:
                          ns = m.group(1)
                  if ns:
                      content = content.replace('android {', f"android {{\n    namespace '{ns}'", 1)
                      print(f"  [FIX] namespace={ns}")

              if 'compileSdkVersion' not in content and 'compileSdk ' not in content:
                  if 'android {' in content:
                      content = content.replace('android {', 'android {\n    compileSdkVersion 34', 1)
                      print(f"  [FIX] compileSdkVersion 34 added")
              else:
                  content = re.sub(r'compileSdkVersion\s+[0-2][0-9](?!\d)', 'compileSdkVersion 34', content)
                  content = re.sub(r'compileSdkVersion\s+3[0-2](?!\d)', 'compileSdkVersion 34', content)

              content = content.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17')
              content = content.replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17')
              content = content.replace('JavaVersion.VERSION_1_7', 'JavaVersion.VERSION_17')

              if 'compileOptions' not in content and 'android {' in content:
                  content = content.replace('android {',
                      'android {\n    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }',
                      1)
                  print(f"  [FIX] compileOptions added")

              with open(bg, 'w') as f:
                  f.write(content)

          pub_roots = [
              os.path.expanduser('~/.pub-cache/hosted/pub.dev'),
          ]

          for root in pub_roots:
              if not os.path.isdir(root):
                  continue
              for bg in glob.glob(os.path.join(root, '**', 'android', 'build.gradle'), recursive=True):
                  fix_gradle(bg)
          EOF
          echo "Script created"

      - name: AUTO-FIX ENGINE — run Python fix
        run: python3 /tmp/fix_gradle.py

      - name: HARDCODED FIX — audio_session full rewrite
        run: |
          for AUDIO_DIR in $(find "$HOME/.pub-cache" -maxdepth 6 -type d -name "audio_session*" 2>/dev/null); do
            BG="$AUDIO_DIR/android/build.gradle"
            [ -f "$BG" ] || continue
            MANIFEST="$AUDIO_DIR/android/src/main/AndroidManifest.xml"
            NS=$(grep -o 'package="[^"]*"' "$MANIFEST" 2>/dev/null | head -1 | sed 's/package="//;s/"//')
            if [ -z "$NS" ]; then NS="com.ryanheise.audio_session"; fi
            
            cat <<EOF > "$BG"
          group 'com.ryanheise.audio_session'
          version '1.0-SNAPSHOT'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
              }
          }
          apply plugin: 'com.android.library'
          apply plugin: 'kotlin-android'
          android {
              namespace '$NS'
              compileSdkVersion 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 34
              }
              dependencies {
                  implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
              }
          }
          EOF
            echo "audio_session rewritten: $BG (namespace=$NS)"
          done

      - name: Fix project-level Gradle
        run: |
          SRC=$GITHUB_WORKSPACE/extracted/SourceFixed/android
          if [ -f "$SRC/build.gradle" ]; then
            sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.24'/" "$SRC/build.gradle" || true
            sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.3.0/" "$SRC/build.gradle" || true
          fi
          if [ -f "$SRC/app/build.gradle" ]; then
            sed -i 's/JavaVersion\.VERSION_1_8/JavaVersion.VERSION_17/g' "$SRC/app/build.gradle" || true
            sed -i 's/JavaVersion\.VERSION_11/JavaVersion.VERSION_17/g' "$SRC/app/build.gradle" || true
            sed -i "s/jvmTarget = '[^']*'/jvmTarget = '17'/g" "$SRC/app/build.gradle" || true
          fi

      - name: Build APK — Auto-Retry Engine
        run: |
          cd $GITHUB_WORKSPACE/extracted/SourceFixed
          find lib -name "*.dart" -exec sed -i 's/context\.router\.pop()/context.maybePop()/g' {} \; 2>/dev/null || true

          echo "════ ATTEMPT 1 ════"
          flutter build apk --release --build-name=2.0.0 --build-number=2 --android-skip-build-dependency-validation 2>&1 | tee /tmp/build1.log && BUILD_OK=1 || BUILD_OK=0

          if [ "$BUILD_OK" = "0" ]; then
            echo "ATTEMPT 1 FAILED, re-running fix engine..."
            python3 /tmp/fix_gradle.py
            echo "════ ATTEMPT 2 ════"
            flutter build apk --release --build-name=2.0.0 --build-number=2 --android-skip-build-dependency-validation 2>&1 | tee /tmp/build2.log && BUILD_OK=1 || BUILD_OK=0
          fi

          if [ "$BUILD_OK" = "0" ]; then
            echo "ATTEMPT 2 FAILED, flutter clean + retry..."
            flutter clean || true
            flutter pub get || true
            python3 /tmp/fix_gradle.py
            echo "════ ATTEMPT 3 ════"
            flutter build apk --release --build-name=2.0.0 --build-number=2 --android-skip-build-dependency-validation 2>&1 | tee /tmp/build3.log && BUILD_OK=1 || BUILD_OK=0
          fi

          if [ "$BUILD_OK" = "0" ]; then
            echo "ALL 3 ATTEMPTS FAILED"
            tail -80 /tmp/build3.log || tail -80 /tmp/build2.log || tail -80 /tmp/build1.log
            exit 1
          fi

          APK="$GITHUB_WORKSPACE/extracted/SourceFixed/build/app/outputs/flutter-apk/app-release.apk"
          cp "$APK" "$GITHUB_WORKSPACE/Nettumi-Adda-v2.apk"
          echo "APK ready:" && ls -lh "$GITHUB_WORKSPACE/Nettumi-Adda-v2.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-v2-Release
          path: Nettumi-Adda-v2.apk
          if-no-files-found: error

      - name: Diagnosis on failure
        if: failure()
        run: |
          echo "=== Build Logs ==="
          for L in /tmp/build1.log /tmp/build2.log /tmp/build3.log; do
            [ -f "$L" ] && tail -40 "$L" || true
          done
          flutter doctor -v || true
