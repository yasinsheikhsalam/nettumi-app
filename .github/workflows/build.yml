name: 🚀 FINAL MASTER SUCCESS BUILD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🦋 Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - name: 💣 Extraction & Keystore
        run: |
          # সোর্স কোড এবং কি-স্টোর এক্সট্রাক্ট করা
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          mkdir -p extracted/SourceFixed/android/app
          unzip -q nettumi-keystore.zip -d temp_ks || true
          find temp_ks -name "*" -type f -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;

      - name: 🧬 The Nuclear Fixer (No More Errors)
        run: |
          cat > /tmp/nuclear_fix.py << 'EOF'
          import os, glob, re

          # ১. pubspec.yaml পুরোপুরি ক্লিন করা (ডুপ্লিকেট এরর বন্ধ)
          pub_path = './extracted/SourceFixed/pubspec.yaml'
          if os.path.exists(pub_path):
              with open(pub_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              
              clean_lines = []
              for line in lines:
                  # dependency_overrides থাকলে তার নিচের সব মুছে ফেলা
                  if 'dependency_overrides:' in line:
                      break
                  clean_lines.append(line)
              
              # একবারই ফ্রেশ ভাবে ইনজেক্ট করা
              clean_lines.append("\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n  flutter_svg: ^2.0.10+1\n")
              
              with open(pub_path, 'w', encoding='utf-8') as f:
                  f.writelines(clean_lines)

          # ২. অ্যান্ড্রয়েড বিল্ড ফাইলগুলো (Gradle) ফিক্স করা
          def fix_gradle(p):
              if not os.path.isfile(p): return
              with open(p, 'r', errors='ignore') as f: c = f.read()
              # ভার্সন ৩৪ এনফোর্স করা
              c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', c)
              c = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', c)
              c = re.sub(r'JavaVersion\.VERSION_1_[781]', 'JavaVersion.VERSION_17', c)
              # মিডিয়া লাইব্রেরি সমস্যা সমাধান
              if 'dependencies {' in c and 'androidx.media' not in c:
                  c = c.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)
              with open(p, 'w') as f: f.write(c)

          for g in glob.glob("./extracted/**/build.gradle", recursive=True): fix_gradle(g)
          for g in glob.glob(os.path.expanduser("~/.pub-cache") + "/**/build.gradle", recursive=True): fix_gradle(g)
          EOF
          python3 /tmp/nuclear_fix.py

      - name: 🏗️ Execute Build
        working-directory: ./extracted/SourceFixed
        run: |
          # কি-স্টোর প্রোপার্টিজ তৈরি
          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n" > android/key.properties
          
          # ফ্রেশ বিল্ড শুরু
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          
          cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-Final-Working.apk

      - name: 📤 Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Success-APK
          path: Nettumi-Final-Working.apk
