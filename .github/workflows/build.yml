name: Build Nettumi Adda APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Extract Project
        run: |
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          chmod +x extracted/SourceFixed/android/gradlew

      - name: Debug Structure
        run: |
          ls -la
          ls -la extracted
          ls -la extracted/SourceFixed/android/app

      - name: Configure Signing & local.properties
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          SOURCE_DIR=$(pwd)/extracted/SourceFixed
          KEYSTORE_PATH=$SOURCE_DIR/android/app/nettumi.keystore

          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=%s\n" "$KEYSTORE_PATH" > $SOURCE_DIR/android/key.properties

          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_SDK_PATH" "$ANDROID_SDK_ROOT" > $SOURCE_DIR/android/local.properties

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653" || true

      - name: Flutter Clean & Pub Get
        working-directory: extracted/SourceFixed
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: extracted/SourceFixed
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/SourceFixed/build/app/outputs/flutter-apk/app-release.apk: Build Nettumi Adda APK

