name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Unzip Any Zip File
        run: |
          # রিপোজিটরিতে থাকা যেকোনো জিপ ফাইল আনজিপ করবে
          unzip *.zip
          
          # gradlew ফাইলটি কোথায় আছে খুঁজে বের করে সেটিকে পারমিশন দেওয়া
          chmod +x $(find . -name gradlew)
          
          # বিল্ড করার জন্য মেইন ডিরেক্টরি সেট করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          cp -r $PROJ_DIR/* . || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
