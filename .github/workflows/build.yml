name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Extract Project
        run: |
          sudo apt-get install -y unzip
          unzip -q Nettumi-Adda-Source-Fixed-v6.zip -d extracted
          echo "=== Extracted ==="
          ls extracted/SourceFixed/

      - name: Extract Keystore
        run: |
          unzip -q nettumi-keystore.zip -d keystore_extracted
          ls keystore_extracted/
          cp keystore_extracted/*.keystore extracted/SourceFixed/android/app/nettumi.keystore 2>/dev/null || \
          cp keystore_extracted/*.jks extracted/SourceFixed/android/app/nettumi.keystore 2>/dev/null || \
          find keystore_extracted -type f -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;

      - name: Configure Signing & local.properties
        run: |
          FLUTTER_SDK_PATH=$(dirname $(dirname $(which flutter)))
          SOURCE_DIR=$(pwd)/extracted/SourceFixed
          KEYSTORE_PATH=$SOURCE_DIR/android/app/nettumi.keystore

          cat > $SOURCE_DIR/android/key.properties << 'EOF'
          storePassword=Nettumi@123
          keyPassword=Nettumi@123
          keyAlias=nettumi_alias
          storeFile=$KEYSTORE_PATH
          EOF

          # Fix storeFile path (substitute variable)
          sed -i "s|\$KEYSTORE_PATH|$KEYSTORE_PATH|g" $SOURCE_DIR/android/key.properties

          cat > $SOURCE_DIR/android/local.properties << EOF
          flutter.sdk=$FLUTTER_SDK_PATH
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

          chmod +x $SOURCE_DIR/android/gradlew

          echo "=== local.properties ==="
          cat $SOURCE_DIR/android/local.properties
          echo "=== key.properties ==="
          cat $SOURCE_DIR/android/key.properties
          echo "=== Keystore ==="
          ls -la $KEYSTORE_PATH

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Flutter pub get
        working-directory: extracted/SourceFixed
        run: |
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Build Signed APK
        working-directory: extracted/SourceFixed
        run: |
          flutter build apk --release \
            --build-name=2.0.0 \
            --build-number=2

      - name: Show full Gradle error
        if: failure()
        working-directory: extracted/SourceFixed
        run: |
          echo "=== local.properties ==="
          cat android/local.properties || true
          echo "=== key.properties ==="
          cat android/key.properties || true
          echo "=== Keystore ==="
          ls -la android/app/nettumi.keystore || true
          echo "=== Gradle stacktrace ==="
          cd android && ./gradlew assembleRelease --stacktrace 2>&1 | tail -150 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/SourceFixed/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
