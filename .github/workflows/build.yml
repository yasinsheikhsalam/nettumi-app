Name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Unzip Source Code
        run: |
          unzip Nettumi-Android-Fixed.zip
          # এই কমান্ডটি ফাইলগুলোকে সঠিক জায়গায় নিয়ে আসবে যেন গিটহাব তা খুঁজে পায়
          cp -r nettumi_project/Android/Sngine/* . || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
