name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Extract Project
        run: unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted

      - name: Configure Signing & local.properties
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))

          cat > extracted/nettumi_adda_full/android/key.properties << EOF
          storePassword=Nettumi@123
          keyPassword=Nettumi@123
          keyAlias=nettumi_alias
          storeFile=$(pwd)/extracted/nettumi_adda_full/android/app/nettumi.keystore
          EOF

          cat > extracted/nettumi_adda_full/android/local.properties << EOF
          flutter.sdk=$FLUTTER_SDK_PATH
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

          echo "FLUTTER_ROOT=$FLUTTER_SDK_PATH" >> $GITHUB_ENV

          echo "=== local.properties ==="
          cat extracted/nettumi_adda_full/android/local.properties
          echo "=== key.properties ==="
          cat extracted/nettumi_adda_full/android/key.properties

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Show full Gradle error
        if: failure()
        working-directory: extracted/nettumi_adda_full/android
        run: |
          echo "=== local.properties ==="
          cat local.properties || echo "NOT FOUND"
          echo "=== key.properties ==="
          cat key.properties || echo "NOT FOUND"
          echo "=== Gradle stacktrace ==="
          ./gradlew assembleRelease --stacktrace 2>&1 | tail -150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
