name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Files
        run: |
          # যদি কোনো জিপ ফাইল থাকে তবে সেটি আনজিপ করবে
          if ls *.zip 1> /dev/null 2>&1; then
            unzip *.zip
            PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
            cp -r $PROJ_DIR/* . || true
          fi
          
          # gradlew ফাইলটি খুঁজে পারমিশন দেওয়া
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -f "$GRADLEW_PATH" ]; then
            chmod +x "$GRADLEW_PATH"
            # যদি gradlew মেইন ডিরেক্টরিতে না থাকে তবে মুভ করা
            if [ "$GRADLEW_PATH" != "./gradlew" ]; then
              cp -r $(dirname "$GRADLEW_PATH")/* . || true
            fi
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
