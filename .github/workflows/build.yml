name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Project
        run: |
          # ১. আপনার আপলোড করা জিপ ফাইলটি আনজিপ করা
          unzip Nettumi-Android-Fixed.zip
          
          # ২. প্রজেক্টের মেইন ফোল্ডার খুঁজে বের করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          echo "Project found at: $PROJ_DIR"
          
          # ৩. ফাইলগুলো একদম সামনে (Root) নিয়ে আসা যেন গিটহাব খুঁজে পায়
          cp -r $PROJ_DIR/* . || true
          
          # ৪. Gradle Wrapper JAR নিশ্চিত করা
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          # ৫. পারমিশন দেওয়া
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
