name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Prepare Files
        run: |
          # আপনার আপলোড করা নির্দিষ্ট জিপ ফাইলটি আনজিপ করা
          unzip Nettumi-Android-Fixed.zip
          
          # প্রজেক্টের মেইন ফোল্ডার (যেখানে build.gradle আছে) খুঁজে বের করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          echo "Project structure found at: $PROJ_DIR"
          
          # ফাইলগুলো মেইন ডিরেক্টরিতে মুভ করা যেন বিল্ড হতে পারে
          cp -r $PROJ_DIR/* . || true
          
          # gradlew ফাইলটি খুঁজে পারমিশন দেওয়া
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_PATH"
          # যদি gradlew মেইন ডিরেক্টরিতে না থাকে তবে কপি করে আনা
          cp "$GRADLEW_PATH" . || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
