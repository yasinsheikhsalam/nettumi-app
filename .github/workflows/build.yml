name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Flutter MUST be set up before anything else so FLUTTER_ROOT is available
      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Extract Project
        run: unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted

      # Write local.properties AFTER flutter-action so $FLUTTER_ROOT is set by the action
      - name: Configure Signing & local.properties
        run: |
          # Copy keystore to a stable path
          cp extracted/nettumi_adda_full/android/app/nettumi.keystore ./nettumi.keystore

          # Write key.properties (storeFile must be absolute path)
          cat > extracted/nettumi_adda_full/android/key.properties << EOF
          storePassword=Nettumi@123
          keyPassword=Nettumi@123
          keyAlias=nettumi_alias
          storeFile=$(pwd)/nettumi.keystore
          EOF

          # Derive Flutter SDK path reliably from the flutter binary set by subosito/flutter-action
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          echo "Flutter SDK resolved to: $FLUTTER_SDK_PATH"

          # Verify the gradle plugin path actually exists
          if [ ! -d "$FLUTTER_SDK_PATH/packages/flutter_tools/gradle" ]; then
            echo "ERROR: Flutter tools gradle directory not found at $FLUTTER_SDK_PATH/packages/flutter_tools/gradle"
            ls "$FLUTTER_SDK_PATH/packages/" || true
            exit 1
          fi

          # Write local.properties with both flutter.sdk and sdk.dir
          cat > extracted/nettumi_adda_full/android/local.properties << EOF
          flutter.sdk=$FLUTTER_SDK_PATH
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

          # Export for subsequent steps
          echo "FLUTTER_ROOT=$FLUTTER_SDK_PATH" >> $GITHUB_ENV
          echo "FLUTTER_SDK=$FLUTTER_SDK_PATH" >> $GITHUB_ENV

          echo "=== local.properties written ==="
          cat extracted/nettumi_adda_full/android/local.properties

      - name: Write correct pubspec.yaml
        run: |
          cat > extracted/nettumi_adda_full/pubspec.yaml << 'EOF'
          name: nettumi_adda
          description: Nettumi Adda
          version: 1.0.0+3
          environment:
            sdk: ">=3.4.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            onesignal_flutter: ^5.3.0
            http: ^1.3.0
            intl: ^0.19.0
            shared_preferences: ^2.5.3
            image_picker: ^1.1.2
            url_launcher: ^6.3.1
            flutter_svg: ^2.1.0
            path_provider: ^2.1.5
            crypto: ^3.0.6
            permission_handler: ^11.3.1
            record: ^5.1.2
            just_audio: ^0.9.26
            auto_route: ^9.2.2
            flutter_riverpod: ^2.6.1
            uuid: ^4.4.2
            device_info_plus: ^10.1.2
            cached_network_image: ^3.3.1
            easy_localization: ^3.0.3
            timeago_flutter: ^3.7.0
            share_plus: ^7.2.2
            flutter_slidable: ^3.1.1
            flutter_spinkit: ^5.2.1
            flutter_html: ^3.0.0-beta.2
            multi_select_flutter: ^4.1.3
            pinput: ^5.0.1
            qr_flutter: ^4.1.0
            photo_view: ^0.14.0
            flutter_image_gallery_saver: ^0.0.2
          dev_dependencies:
            flutter_test:
              sdk: flutter
            build_runner: ^2.4.13
            auto_route_generator: ^9.0.0
            flutter_lints: ^3.0.2
            custom_lint: ^0.6.4
            riverpod_lint: ^2.3.7
            logger: ^2.5.0
          dependency_overrides:
            intl: 0.19.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
              - assets/images/icons/
              - assets/images/icons/chat/
              - assets/images/icons/navbar/
              - assets/images/icons/settings/
              - assets/images/icons/social/
              - assets/images/snackbars/
              - assets/images/snackbars/types/
              - assets/translations/
            fonts:
              - family: Poppins
                fonts:
                  - asset: assets/fonts/Poppins/Poppins-Regular.ttf
                  - asset: assets/fonts/Poppins/Poppins-Bold.ttf
                    weight: 700
                  - asset: assets/fonts/Poppins/Poppins-Light.ttf
                    weight: 300
              - family: Tajawal
                fonts:
                  - asset: assets/fonts/Tajawal/Tajawal-Regular.ttf
                  - asset: assets/fonts/Tajawal/Tajawal-Bold.ttf
                    weight: 700
                  - asset: assets/fonts/Tajawal/Tajawal-Light.ttf
                    weight: 300
          EOF

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Show full Gradle error
        if: failure()
        working-directory: extracted/nettumi_adda_full/android
        run: |
          echo "=== local.properties ==="
          cat local.properties || echo "NOT FOUND"
          echo "=== key.properties ==="
          cat key.properties || echo "NOT FOUND"
          echo "=== Full Gradle stacktrace ==="
          ./gradlew assembleRelease --stacktrace 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
