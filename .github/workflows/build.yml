name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # ডার্ট ৩.৬.০+ এর প্রয়োজনীয়তা মেটাতে একদম লেটেস্ট ফ্লাটার ব্যবহার করা হয়েছে
          flutter-version: 3.27.1
          channel: stable

      - name: Install tools
        run: sudo apt-get install -y unzip

      - name: Extract Files
        run: |
          unzip -o Nettumi-Adda-Source.zip -d extracted
          unzip -o nettumi-keystore.zip
          mv *.keystore nettumi.keystore || true

      - name: Force Fix Dependencies (Auto-Healing)
        working-directory: extracted/nettumi_adda_full
        run: |
          python3 - << 'PYEOF'
          import re
          import os

          pubspec_path = 'pubspec.yaml'
          with open(pubspec_path, 'r') as f:
              content = f.read()

          # সমস্যাযুক্ত প্যাকেজগুলো সরিয়ে দিচ্ছে অথবা ভার্সন ফিক্স করছে
          content = re.sub(r'custom_lint:.*', 'custom_lint: any', content)
          content = re.sub(r'riverpod_lint:.*', 'riverpod_lint: any', content)
          content = re.sub(r'intl:.*', 'intl: any', content)
          content = re.sub(r'flutter_lints:.*', 'flutter_lints: any', content)

          # কনফ্লিক্ট মেটাতে ওভাররাইড যোগ করা হচ্ছে
          override_text = "\ndependency_overrides:\n  intl: any\n  custom_lint: any\n  riverpod_lint: any\n"
          if 'dependency_overrides:' not in content:
              content += override_text

          with open(pubspec_path, 'w') as f:
              f.write(content)
          PYEOF
          echo "Dependencies fixed automatically."

      - name: Setup Android Build
        run: |
          mkdir -p extracted/nettumi_adda_full/android/app/
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/nettumi.keystore
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > extracted/nettumi_adda_full/android/key.properties

      - name: Build APK (Ignore All Warnings)
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter clean
          flutter pub get
          # আইকন বা ছোটখাটো ভুল পুরোপুরি এড়িয়ে বিল্ড করার নির্দেশ
          flutter build apk --release --no-shrink --no-tree-shake-icons --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
