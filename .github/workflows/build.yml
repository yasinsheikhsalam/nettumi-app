name: Build Nettumi Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Project and Fix Gradle
        run: |
          # ফাইল আনজিপ করা
          unzip Nettumi-Android-Fixed.zip
          
          # প্রজেক্ট ডিরেক্টরি খুঁজে বের করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          cp -r $PROJ_DIR/* . || true
          
          # Gradle Wrapper ফাইলগুলো ম্যানুয়ালি ডাউনলোড করা (যদি মিসিং থাকে)
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          # এক্সিকিউশন পারমিশন দেওয়া
          chmod +x gradlew

      - name: Build and Sign Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/nettumi.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Release-APK
          path: app/build/outputs/apk/release/*.apk
