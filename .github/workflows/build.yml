name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Extract Project & Keystore
        run: |
          # সোর্স কোড আনজিপ করা
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          
          # কি-স্টোর জিপ ফাইলটি ছোট হাতের বা বড় হাতের অক্ষরে থাকতে পারে, তাই 'find' ব্যবহার করা হচ্ছে
          KEYSTORE_ZIP=$(find . -maxdepth 1 -iname "nettumi-keystore.zip" | head -n 1)
          if [ -z "$KEYSTORE_ZIP" ]; then
            echo "Error: nettumi-keystore.zip not found!"
            exit 1
          fi
          
          unzip -q "$KEYSTORE_ZIP" -d keystore_folder
          
          # প্রোজেক্ট রুট খুঁজে বের করা
          ROOT=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_ROOT=$ROOT" >> $GITHUB_ENV
          
          # কি-স্টোর ফাইল খুঁজে বের করা
          KEYSTORE_FILE=$(find keystore_folder -name "*.keystore" | head -n 1)
          echo "KEYSTORE_PATH=$KEYSTORE_FILE" >> $GITHUB_ENV

      - name: Ultimate Dependency Auto-Fix
        run: |
          cd ${{ env.PROJECT_ROOT }}
          python3 - << 'PYEOF'
          import re, os
          path = 'pubspec.yaml'
          if os.path.exists(path):
              with open(path, 'r') as f: content = f.read()
              # কনফ্লিক্ট করা প্যাকেজগুলোকে any করে দেওয়া
              pkgs = ['intl', 'custom_lint', 'riverpod_lint', 'share_plus', 'cached_network_image']
              for p in pkgs:
                  content = re.sub(f'{p}:.*', f'{p}: any', content)
              
              if 'dependency_overrides:' not in content:
                  content += '\ndependency_overrides:\n'
              for p in pkgs:
                  if p not in content.split('dependency_overrides:')[1]:
                      content += f'  {p}: any\n'
              
              with open(path, 'w') as f: f.write(content)
          PYEOF

      - name: Configure Signing
        run: |
          # অ্যান্ড্রয়েড অ্যাপ ডিরেক্টরিতে কি-স্টোর কপি করা
          mkdir -p ${{ env.PROJECT_ROOT }}/android/app
          cp "${{ env.KEYSTORE_PATH }}" "${{ env.PROJECT_ROOT }}/android/app/nettumi.keystore"
          
          # key.properties তৈরি করা
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' \
            > ${{ env.PROJECT_ROOT }}/android/key.properties

      - name: Flutter pub get
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean
          flutter pub get

      - name: Build Signed APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          # বিস্তারিত লগের জন্য verbose ব্যবহার
          flutter build apk --release --no-shrink --no-tree-shake-icons --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
