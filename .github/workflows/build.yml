name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # ডার্ট ৩.৫.০+ এর প্রয়োজনীয়তা মেটাতে নতুন ফ্লাটার ভার্সন ব্যবহার করা হয়েছে
          flutter-version: 3.24.0 
          channel: stable

      - name: Install tools
        run: sudo apt-get install -y unzip

      - name: Unzip Source Code
        run: unzip -o Nettumi-Adda-Source.zip -d extracted

      - name: Fix pubspec dependencies
        working-directory: extracted/nettumi_adda_full
        run: |
          python3 - << 'PYEOF'
          import re

          with open('pubspec.yaml', 'r') as f:
              content = f.read()

          # সব কনফ্লিক্ট প্যাকেজ একবারে ফিক্স করা হচ্ছে
          content = re.sub(r'easy_localization:.*', 'easy_localization: ^3.0.3', content)
          content = re.sub(r'intl:.*', 'intl: ^0.19.0', content)
          content = re.sub(r'flutter_lints:.*', 'flutter_lints: ^4.0.0', content)
          content = re.sub(r'permission_handler:.*', 'permission_handler: ^11.3.1', content)

          if 'dependency_overrides:' not in content:
              content += '\ndependency_overrides:\n  intl: ^0.19.0\n  permission_handler: ^11.3.1\n'

          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          PYEOF

      - name: Unzip Keystore
        run: |
          unzip -o nettumi-keystore.zip
          mv *.keystore nettumi.keystore || true
          mkdir -p extracted/nettumi_adda_full/android/app/
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/nettumi.keystore

      - name: Create key.properties
        run: printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > extracted/nettumi_adda_full/android/key.properties

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter clean
          flutter pub get

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        run: flutter build apk --release --no-shrink --no-tree-shake-icons --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
