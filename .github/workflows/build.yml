name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ক্যাশে বন্ধ করে দেওয়া হয়েছে যেন এরর না আসে

      - name: Unzip Project
        run: |
          # আপনার রিপোজিটরিতে থাকা যেকোনো জিপ ফাইল আনজিপ করবে
          unzip *.zip
          
          # প্রজেক্ট ফোল্ডারটি খুঁজে বের করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          echo "Project found at: $PROJ_DIR"
          
          # ফাইলগুলোকে মেইন ডিরেক্টরিতে মুভ করা যেন বিল্ড সহজ হয়
          cp -r $PROJ_DIR/* . || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
