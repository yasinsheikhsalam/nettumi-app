name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Extract Project
        run: |
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          # প্রজেক্ট রুট খুঁজে বের করা যদি ফোল্ডার স্ট্রাকচার ভিন্ন হয়
          PROJECT_PATH=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV

      - name: Configure Signing
        run: |
          # কি-স্টোর ফাইলটি সঠিক জায়গায় কপি করা
          find extracted -name "nettumi.keystore" -exec cp {} $PROJECT_PATH/android/app/ \; || true
          
          # key.properties তৈরি করা
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' \
            > $PROJECT_PATH/android/key.properties

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          flutter clean
          flutter pub get

      - name: Build Signed APK
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          # বিল্ড আরও ডিটেইল ভাবে দেখার জন্য --verbose ফ্ল্যাগ যোগ করা হয়েছে
          flutter build apk --release --no-shrink --no-tree-shake-icons --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: ${{ env.PROJECT_PATH }}/build/app/outputs/flutter-apk/*.apk
