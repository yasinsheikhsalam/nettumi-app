name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21  # জাভা ভার্সন ১৭ থেকে বাড়িয়ে ২১ করা হয়েছে
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Prepare Project
        run: |
          unzip Nettumi-Android-Fixed.zip
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          cp -r $PROJ_DIR/* . || true
          
          # Gradle Wrapper JAR ডাউনলোড (নিরাপত্তার জন্য)
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
