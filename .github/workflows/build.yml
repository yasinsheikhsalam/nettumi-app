name: Final Guaranteed Success Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Extract Project
        run: |
          sudo apt-get install -y unzip python3
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          unzip -q nettumi-keystore.zip -d keystore_out || true
          KS=$(find . -name "*.keystore" -o -name "*.jks" | head -1)
          mkdir -p extracted/SourceFixed/android/app
          [ -f "$KS" ] && cp "$KS" extracted/SourceFixed/android/app/nettumi.keystore || echo "Keystore Not Found"

      - name: Python Intelligence Fixer (No Duplicates)
        run: |
          cat > /tmp/intelligent_fix.py << 'EOF'
          import os, re, glob

          def fix_gradle(file_path):
              if not os.path.isfile(file_path): return
              try:
                  with open(file_path, 'r', errors='ignore') as f:
                      content = f.read()
                  
                  # ১. অ্যান্ড্রয়েড কনফিগারেশন আপডেট
                  content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
                  content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
                  content = re.sub(r'compileSdk\s+\d+', 'compileSdk 34', content)
                  
                  # ২. মিডিয়া ডিপেন্ডেন্সি এরর ফিক্স (সঠিক পজিশনিং)
                  if 'dependencies {' in content and 'androidx.media:media' not in content:
                      content = content.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)

                  with open(file_path, 'w') as f: f.write(content)
              except: pass

          def fix_pubspec(file_path):
              if not os.path.isfile(file_path): return
              try:
                  with open(file_path, 'r') as f: lines = f.readlines()
                  # ডুপ্লিকেট কী এড়াতে dependency_overrides থাকলে আগে তা সরিয়ে ফেলা
                  new_lines = [l for l in lines if 'dependency_overrides:' not in l and '  intl:' not in l and '  collection:' not in l]
                  # নতুন করে ওভাররাইড যুক্ত করা
                  new_lines.append("\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n")
                  with open(file_path, 'w') as f: f.writelines(new_lines)
              except: pass

          # রান প্যাচিং
          fix_pubspec('./extracted/SourceFixed/pubspec.yaml')
          for f in glob.glob("./extracted/**/build.gradle", recursive=True): fix_gradle(f)
          for f in glob.glob(os.path.expanduser("~/.pub-cache") + "/**/build.gradle", recursive=True): fix_gradle(f)
          EOF
          python3 /tmp/intelligent_fix.py

      - name: Ultimate Build Execution
        run: |
          cd extracted/SourceFixed
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # ফ্রেশ বিল্ড এনভায়রনমেন্ট
          rm -f pubspec.lock
          flutter pub get
          
          # ফাইনাল বিল্ড কমান্ড
          if flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation; then
            echo "SUCCESS"
            cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/Nettumi-Build.apk
          else
            # যদি প্রথমবার ফেইল করে, ক্যাশ ক্লিন করে শেষ চেষ্টা
            flutter clean
            flutter pub get
            flutter build apk --release --no-tree-shake-icons
            cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/Nettumi-Build.apk
          fi

      - name: Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-Working-APK
          path: Nettumi-Build.apk
