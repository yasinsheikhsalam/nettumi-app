name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5' # স্থিতিশীলতার জন্য এই ভার্সনটি সেরা
          channel: 'stable'

      - name: Smart Extract (Source & Keystore)
        run: |
          # সোর্স কোড আনজিপ
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted || true
          
          # কি-স্টোর জিপ ছোট/বড় হাতের যাই হোক খুঁজে বের করে আনজিপ করবে
          KEY_ZIP=$(find . -maxdepth 1 -iname "*keystore.zip*" | head -n 1)
          if [ -n "$KEY_ZIP" ]; then
            unzip -q "$KEY_ZIP" -d keystore_folder || true
          fi
          
          # প্রোজেক্টের আসল ফোল্ডার খুঁজে বের করা (যেখানে pubspec.yaml আছে)
          ROOT=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_ROOT=$ROOT" >> $GITHUB_ENV
          
          # কি-স্টোর ফাইলের আসল পাথ খুঁজে বের করা
          K_FILE=$(find . -name "*.keystore" | head -n 1)
          echo "KEYSTORE_PATH=$K_FILE" >> $GITHUB_ENV

      - name: Repair pubspec.yaml & Solve Conflicts
        run: |
          cd ${{ env.PROJECT_ROOT }}
          python3 - << 'PYEOF'
          import re, os
          path = 'pubspec.yaml'
          if os.path.exists(path):
              with open(path, 'r') as f: lines = f.readlines()
              
              # ১. সিনট্যাক্স এরর ঠিক করা (ভুল লাইন মুছে ফেলা)
              fixed_lines = []
              for line in lines:
                  if "Unexpected child" in line or "·" in line: continue
                  fixed_lines.append(line)
              
              content = "".join(fixed_lines)
              
              # ২. ভার্সন কনফ্লিক্ট ঠিক করা (সবগুলোকে any করে দেওয়া)
              pkgs = ['intl', 'share_plus', 'cached_network_image', 'custom_lint', 'riverpod_lint']
              for p in pkgs:
                  content = re.sub(f'{p}:.*', f'{p}: any', content)
              
              # ৩. Dependency Overrides যোগ করা
              if 'dependency_overrides:' not in content:
                  content += '\ndependency_overrides:\n'
              for p in pkgs:
                  if p not in content.split('dependency_overrides:')[1]:
                      content += f'  {p}: any\n'
              
              with open(path, 'w') as f: f.write(content)
              print("Pubspec Repaired and Conflicts Solved!")
          PYEOF

      - name: Configure Signing (Auto-Path)
        run: |
          # অ্যান্ড্রয়েড ফোল্ডার খুঁজে বের করা
          ANDROID_DIR=$(find ${{ env.PROJECT_ROOT }} -name "android" -type d | head -n 1)
          mkdir -p "$ANDROID_DIR/app"
          
          # কি-স্টোর কপি
          cp "${{ env.KEYSTORE_PATH }}" "$ANDROID_DIR/app/nettumi.keystore" || echo "Keystore copy failed"
          
          # key.properties এবং local.properties তৈরি
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > "$ANDROID_DIR/key.properties"
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > "$ANDROID_DIR/local.properties"

      - name: Flutter Pub Repair & Get
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Build Signed APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release --no-shrink --no-tree-shake-icons --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-Fixed-APK
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
