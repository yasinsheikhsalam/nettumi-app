name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5' # আগের সফল ভার্সনটি ব্যবহার করা নিরাপদ
          channel: 'stable'

      - name: Extract Project & Keystore
        run: |
          # সোর্স কোড আনজিপ
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          
          # কি-স্টোর আনজিপ (নাম ছোট বা বড় হাতের যাই হোক খুঁজে নেবে)
          KEY_ZIP=$(find . -maxdepth 1 -iname "nettumi-keystore.zip")
          unzip -q "$KEY_ZIP" -d keystore_folder
          
          # প্রোজেক্টের আসল ফোল্ডার খুঁজে বের করা
          ROOT=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_ROOT=$ROOT" >> $GITHUB_ENV
          
          # কি-স্টোর ফাইলের পাথ খুঁজে বের করা
          K_FILE=$(find keystore_folder -name "*.keystore" | head -n 1)
          echo "KEYSTORE_PATH=$K_FILE" >> $GITHUB_ENV

      - name: Configure Signing
        run: |
          # কি-স্টোর ফাইলটি অ্যান্ড্রয়েড ফোল্ডারে নিয়ে আসা
          mkdir -p ${{ env.PROJECT_ROOT }}/android/app
          cp "${{ env.KEYSTORE_PATH }}" "${{ env.PROJECT_ROOT }}/android/app/nettumi.keystore"
          
          # key.properties এবং local.properties ডাইনামিক ভাবে তৈরি
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > ${{ env.PROJECT_ROOT }}/android/key.properties
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > ${{ env.PROJECT_ROOT }}/android/local.properties

      - name: Flutter pub get
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean
          flutter pub get

      - name: Build Signed APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
