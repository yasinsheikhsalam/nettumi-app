name: 🚀 FINAL ABSOLUTE SOLUTION - Ultra Power Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild?'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: apk
            artifact_name: "Nettumi-Release-APK"
          - target: aab
            artifact_name: "Nettumi-Release-AAB"

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 💣 NUCLEAR EXTRACTION & KEYSTORE
        run: |
          mkdir -p extracted/SourceFixed/android/app
          
          if [ -f "Nettumi-Adda-Source-Fixed-v11.zip" ]; then
            unzip -q "Nettumi-Adda-Source-Fixed-v11.zip" -d extracted/
            echo "✅ Source extracted"
          else
            echo "❌ Source ZIP not found!"
            exit 1
          fi
          
          if [ -f "nettumi-keystore.zip" ]; then
            unzip -q "nettumi-keystore.zip" -d temp_ks
            find temp_ks -name "*.keystore" -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;
            echo "✅ Keystore extracted"
          else
            echo "⚠️ Keystore not found"
          fi

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: extracted/SourceFixed/**/*.gradle*

      - name: 🦋 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            \~/.pub-cache
            extracted/SourceFixed/.dart_tool
          key: \( {{ runner.os }}-flutter- \){{ env.FLUTTER_VERSION }}-${{ hashFiles('extracted/SourceFixed/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-

      # ================== ULTRA NUCLEAR FIX (YAML Safe) ==================
      - name: 🧬 ULTRA NUCLEAR FIX
        working-directory: ./extracted/SourceFixed
        run: python3 -c '
import os, glob, re
def log(m): print("🔧", m)

if os.path.exists("pubspec.yaml"):
    with open("pubspec.yaml", "r", encoding="utf-8") as f:
        content = f.read()
    content = re.sub(r"^\s*dependency_overrides:\s*(?:\n\s+.*)*", "", content, flags=re.MULTILINE)
    overrides = """\n\ndependency_overrides:
  intl: ^0.19.0
  collection: ^1.19.0
  meta: ^1.12.0
  flutter_svg: ^2.0.10+1
  path_provider_android: ^2.1.2
"""
    content = content.rstrip() + overrides
    with open("pubspec.yaml", "w", encoding="utf-8") as f:
        f.write(content)
    log("pubspec.yaml fixed")

for f in glob.glob("**/*gradle*", recursive=True):
    if not os.path.isfile(f): continue
    with open(f, "r", encoding="utf-8", errors="ignore") as ff:
        c = ff.read()
    c = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 34", c)
    c = re.sub(r"targetSdkVersion\s+\d+", "targetSdkVersion 34", c)
    c = re.sub(r"minSdkVersion\s+\d+", "minSdkVersion 21", c)
    with open(f, "w", encoding="utf-8") as ff:
        ff.write(c)
    log(f"Fixed: {f}")

print("🎉 ULTRA NUCLEAR FIX COMPLETE!")
'

      # ================== BUILD ==================
      - name: 🏗️ Build ${{ matrix.target }}
        working-directory: ./extracted/SourceFixed
        run: |
          flutter clean
          flutter pub get || flutter pub get || flutter pub get

          echo "🚀 Starting ${{ matrix.target.toUpperCase() }} build..."
          
          if [ "${{ matrix.target }}" = "apk" ]; then
            flutter build apk --release --no-tree-shake-icons
            cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-APK-Success.apk
          else
            flutter build appbundle --release
            cp build/app/outputs/bundle/release/app-release.aab ../../Nettumi-AAB-Success.aab
          fi

          ls -la ../../Nettumi-*

      - name: 📤 Upload ${{ matrix.artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: Nettumi-*-Success.*
          retention-days: 30

      - name: 🎉 Success Message
        if: success()
        run: echo "✅ Build Successful for ${{ matrix.target }}!"
