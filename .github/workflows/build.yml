name: Ultimate Success Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Extract Project & Keystore
        run: |
          sudo apt-get install -y unzip python3
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          unzip -q nettumi-keystore.zip -d extracted/SourceFixed/android/app/ || true
          # কি-স্টোর ফাইলটি সঠিক জায়গায় আছে কিনা নিশ্চিত করা
          find extracted/SourceFixed/android/app/ -name "*.keystore" -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;
          find extracted/SourceFixed/android/app/ -name "*.jks" -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;

      - name: Self-Healing Engine (Guaranteed Logic)
        run: |
          cat > /tmp/final_fixer.py << 'EOF'
          import os, glob

          def patch_gradle(path):
              if not os.path.isfile(path): return
              with open(path, 'r', errors='ignore') as f: content = f.read()
              # অ্যান্ড্রয়েড ও জাভা ভার্সন ফিক্স
              import re
              content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
              content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
              content = re.sub(r'JavaVersion\.VERSION_1_[781]', 'JavaVersion.VERSION_17', content)
              # মিডিয়া এরর ফিক্স
              if 'dependencies {' in content and 'androidx.media:media' not in content:
                  content = content.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)
              with open(path, 'w') as f: f.write(content)

          def patch_pubspec(path):
              if not os.path.isfile(path): return
              with open(path, 'r') as f: lines = f.readlines()
              # ডুপ্লিকেট কী এড়াতে আগের সব ওভাররাইড মুছে ফেলা
              clean_lines = []
              skip = False
              for line in lines:
                  if 'dependency_overrides:' in line: skip = True
                  if skip and line.strip() == "": skip = False
                  if not skip: clean_lines.append(line)
              # শেষে নতুন ওভাররাইড যোগ করা
              clean_lines.append("\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n")
              with open(path, 'w') as f: f.writelines(clean_lines)

          # রান প্যাচিং
          patch_pubspec('./extracted/SourceFixed/pubspec.yaml')
          for g in glob.glob("./extracted/**/build.gradle", recursive=True): patch_gradle(g)
          for g in glob.glob(os.path.expanduser("~/.pub-cache") + "/**/build.gradle", recursive=True): patch_gradle(g)
          EOF
          python3 /tmp/final_fixer.py

      - name: Final Autonomous Build
        run: |
          cd extracted/SourceFixed
          # লাইসেন্স গ্রহণ
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # কি-স্টোর প্রোপার্টিজ তৈরি
          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n" > android/key.properties
          
          # ডিপেন্ডেন্সি ও বিল্ড
          flutter clean
          flutter pub get
          
          if flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation; then
            cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-Final.apk
          else
            echo "বিল্ড ফেইল হয়েছে, কিন্তু আমি আবারও চেষ্টা করছি..."
            flutter pub upgrade
            flutter build apk --release --no-tree-shake-icons
            cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-Final.apk
          fi

      - name: Deliver Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-Working-APK
          path: Nettumi-Final.apk
