name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3' # Claude AI এর সাজেস্ট করা স্টেবল ভার্সন
          channel: 'stable'

      - name: Prepare Files
        run: |
          # সোর্স কোড ও কী-স্টোর আনজিপ করা (ওভাররাইট মোডে)
          unzip -o Nettumi-Adda-Source.zip -d extracted
          unzip -o nettumi-keystore.zip
          
          # কী-স্টোর সঠিক ফোল্ডারে পাঠানো
          mv *.keystore nettumi.keystore || true
          mkdir -p extracted/nettumi_adda_full/android/app/
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/

      - name: Setup Signing Properties
        run: |
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > extracted/nettumi_adda_full/android/key.properties

      - name: Flutter Clean & Get
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter clean
          flutter pub get

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        # ফাইল ওয়াচিং এরর এড়াতে --no-tree-shake-icons যোগ করা হয়েছে এবং সিনট্যাক্স শক্তিশালী করা হয়েছে
        run: |
          flutter build apk --release --no-shrink --no-tree-shake-icons --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
