name: 🚨 FINAL SUCCESS GUARANTEED

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🦋 Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - name: 💣 Extraction & Keystore
        run: |
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          mkdir -p extracted/SourceFixed/android/app
          unzip -q nettumi-keystore.zip -d temp_ks || true
          find temp_ks -name "*" -type f -exec cp {} extracted/SourceFixed/android/app/nettumi.keystore \;

      - name: 🧬 The Ultimate Auto-Fixer (No Duplicates)
        run: |
          cat > /tmp/fixer.py << 'EOF'
          import os, glob, re

          def solve_pubspec():
              path = './extracted/SourceFixed/pubspec.yaml'
              if not os.path.exists(path): return
              with open(path, 'r', encoding='utf-8') as f: lines = f.readlines()
              
              new_lines = []
              for line in lines:
                  # ফাইলে আগে থেকে dependency_overrides থাকলে তা বাদ দিয়ে দেয়া
                  if 'dependency_overrides:' in line: break
                  new_lines.append(line)
              
              # একদম শেষে একবারই ওভাররাইড যোগ করা
              new_lines.append("\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n  flutter_svg: ^2.0.10+1\n")
              
              with open(path, 'w', encoding='utf-8') as f: f.writelines(new_lines)
              print("✅ Pubspec.yaml cleaned and fixed.")

          def solve_gradle(path):
              if not os.path.isfile(path): return
              with open(path, 'r', errors='ignore') as f: content = f.read()
              # ভার্সন ফিক্স
              content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
              content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
              content = re.sub(r'JavaVersion\.VERSION_1_[781]', 'JavaVersion.VERSION_17', content)
              # মিডিয়া লাইব্রেরি ইনজেকশন
              if 'dependencies {' in content and 'androidx.media' not in content:
                  content = content.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)
              with open(path, 'w') as f: f.write(content)

          solve_pubspec()
          for g in glob.glob("./extracted/**/build.gradle", recursive=True): solve_gradle(g)
          for g in glob.glob(os.path.expanduser("~/.pub-cache") + "/**/build.gradle", recursive=True): solve_gradle(g)
          EOF
          python3 /tmp/fixer.py

      - name: 🏗️ Final Build Execution
        working-directory: ./extracted/SourceFixed
        run: |
          # কি-স্টোর প্রোপার্টিজ
          printf "storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n" > android/key.properties
          
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          
          cp build/app/outputs/flutter-apk/app-release.apk ../../Nettumi-Final-App.apk

      - name: 📤 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Download-Nettumi-APK
          path: Nettumi-Final-App.apk
