name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Extract Project
        run: |
          # জিপ ফাইলটি ঠিকমতো এক্সট্র্যাক্ট করা
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted

      - name: Configure Signing
        run: |
          # ডাইনামিক পাথ ব্যবহার করে কি-স্টোর সেটআপ
          PROJECT_ROOT=$(find extracted -name "android" -type d | head -n 1)
          APP_DIR="$PROJECT_ROOT/app"
          
          # যদি জিপের ভেতর কি-স্টোর থাকে তবে কপি করা
          find extracted -name "nettumi.keystore" -exec cp {} "$APP_DIR/nettumi.keystore" \; || true
          
          # key.properties তৈরি করা
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > "$PROJECT_ROOT/key.properties"

      - name: Flutter Pub Get
        run: |
          # যেখানে pubspec.yaml আছে সেই ফোল্ডারে যাওয়া
          PROJECT_DIR=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_DIR"
          flutter config --android-sdk $ANDROID_SDK_ROOT
          flutter pub get

      - name: Build Signed APK
        run: |
          PROJECT_DIR=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_DIR"
          # কোনো কোড ছাড়াই সরাসরি বিল্ড
          flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          # সাব-ডিরেক্টরি থেকে APK খুঁজে বের করা
          path: extracted/**/build/app/outputs/flutter-apk/*.apk
