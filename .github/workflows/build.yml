name: Super Auto-Fix Nettumi Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Extract & Preparation
        run: |
          sudo apt-get install -y unzip python3
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          unzip -q nettumi-keystore.zip -d keystore_out || true
          KS=$(find . -name "*.keystore" -o -name "*.jks" | head -1)
          [ -f "$KS" ] && cp "$KS" extracted/SourceFixed/android/app/nettumi.keystore || echo "Keystore missing"

      - name: Create Ultra-Fix Python Engine
        run: |
          cat > /tmp/auto_fix.py << 'EOF'
          import os, re, glob

          def fix_gradle(file_path):
              if not os.path.exists(file_path): return
              with open(file_path, 'r', errors='ignore') as f:
                  content = f.read()
              
              # 1. Force Upgrade SDK Versions
              content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
              content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
              content = re.sub(r'compileSdk\s+\d+', 'compileSdk 34', content)
              
              # 2. Force Java 17 Compatibility
              content = re.sub(r'JavaVersion\.VERSION_1_[78]', 'JavaVersion.VERSION_17', content)
              content = re.sub(r'JavaVersion\.VERSION_11', 'JavaVersion.VERSION_17', content)
              content = re.sub(r'jvmTarget = .+', 'jvmTarget = "17"', content)

              # 3. Add Missing Namespace (CRITICAL for AGP 8+)
              if 'android {' in content and 'namespace' not in content:
                  manifest = os.path.join(os.path.dirname(file_path), 'src', 'main', 'AndroidManifest.xml')
                  if os.path.exists(manifest):
                      with open(manifest, 'r') as m:
                          pkg = re.search(r'package="([^"]+)"', m.read())
                          if pkg:
                              content = content.replace('android {', f'android {{\n    namespace "{pkg.group(1)}"', 1)
              
              # 4. FIX audio_session/androidx.media error
              if 'androidx.media' not in content and 'dependencies {' in content:
                  content = content.replace('dependencies {', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', 1)

              with open(file_path, 'w') as f:
                  f.write(content)

          # Fix all Gradle files in Project and Pub Cache
          for root_dir in ['./extracted', os.path.expanduser('~/.pub-cache')]:
              for path in glob.glob(f"{root_dir}/**/build.gradle", recursive=True):
                  fix_gradle(path)
          EOF

      - name: Run Auto-Fix & Pub Get
        run: |
          cd extracted/SourceFixed
          # Fix pubspec for known broken packages
          sed -i 's/flutter_svg:.*/flutter_svg: ^2.0.10+1/' pubspec.yaml
          python3 /tmp/auto_fix.py
          flutter pub get || (flutter clean && flutter pub get)

      - name: Build APK with Self-Healing Loop
        run: |
          cd extracted/SourceFixed
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Attempt Build and Fix if fails
          for i in {1..3}; do
            echo "════ Attempt $i ════"
            python3 /tmp/auto_fix.py
            
            # Force Fix for gradle.properties (Enable AndroidX)
            printf "android.useAndroidX=true\nandroid.enableJetifier=true\n" >> android/gradle.properties

            if flutter build apk --release --android-skip-build-dependency-validation; then
              echo "SUCCESS"
              cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/Nettumi-Build.apk
              exit 0
            else
              echo "Build failed, applying more aggressive fixes..."
              flutter clean
            fi
          done
          exit 1

      - name: Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: Nettumi-Build.apk

      - name: Diagnosis on Total Failure
        if: failure()
        run: |
          echo "Build failed after 3 attempts. Checking environment..."
          flutter doctor -v
