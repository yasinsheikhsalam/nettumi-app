name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure Android Signing
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          # সরাসরি রুট ডিরেক্টরি ব্যবহার করা হচ্ছে
          SOURCE_DIR=$(pwd)
          
          # Keystore কনফিগারেশন
          KEYSTORE_PATH=$SOURCE_DIR/android/app/nettumi.keystore
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=%s\n' "$KEYSTORE_PATH" > $SOURCE_DIR/android/key.properties
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_SDK_PATH" "$ANDROID_SDK_ROOT" > $SOURCE_DIR/android/local.properties

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install NDK
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" || true

      - name: Flutter Pub Get & Upgrade
        run: |
          flutter pub cache clean
          flutter pub get
          # প্যাকেজ ভার্সন জনিত সমস্যা থাকলে এটি ফিক্স করার চেষ্টা করবে
          flutter pub upgrade 

      - name: Build Signed APK
        run: |
          flutter build apk --release \
            --build-name=2.0.0 \
            --build-number=2 \
            --no-shrink

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-v2-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Debug On Failure
        if: failure()
        run: |
          echo "=== Checking Files ==="
          ls -R
          echo "=== Gradle Stacktrace ==="
          cd android && ./gradlew assembleRelease --stacktrace 2>&1 | tail -200
