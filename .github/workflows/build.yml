name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Unzip and Move Files
        run: |
          # জিপ ফাইলটির নাম আপনার রিপোজিটরির সাথে মিলিয়ে নিন
          unzip Nettumi-Android-Fixed.zip
          
          # ফাইলগুলো যেখানেই থাকুক, সেগুলোকে মেইন ডিরেক্টরিতে নিয়ে আসা
          find . -name "gradlew" -exec chmod +x {} +
          
          # যেখানে build.gradle আছে সেই ফোল্ডারে যাওয়া
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          echo "Project found in: $PROJ_DIR"
          
          # ফাইলগুলো মেইন ডিরেক্টরিতে মুভ করা
          cp -r $PROJ_DIR/* . || true

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
