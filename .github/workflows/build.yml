name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # নির্দিষ্ট ভার্সন না দিয়ে লেটেস্ট স্ট্যাবল ব্যবহার করা হচ্ছে যাতে সামঞ্জস্য থাকে
          cache: true

      - name: Extract Project & Fix Permissions
        run: |
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted || echo "Unzip failed or already extracted"
          # সোর্স কোড যেখানেই থাকুক তা খুঁজে বের করা
          SOURCE_DIR=$(find $(pwd)/extracted -name "pubspec.yaml" -exec dirname {} \;)
          echo "SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_ENV
          chmod +x $SOURCE_DIR/android/gradlew || true

      - name: Auto-fix pubspec.yaml & Environment
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          # pubspec.yaml এর কোনো ইনডেন্টেশন সমস্যা থাকলে তা চেক করা (বেসিক ফিক্স)
          # আপনি স্ক্রিনশটে share_plus: any তে এরর দেখিয়েছেন, আমরা pub repair করার চেষ্টা করব
          flutter pub cache clean
          flutter pub get || (echo "Attempting to fix pubspec..." && flutter pub upgrade)

      - name: Configure Signing & local.properties
        run: |
          SOURCE_DIR=${{ env.SOURCE_DIR }}
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK_PATH=$(dirname $(dirname $FLUTTER_BIN))
          
          # Keystore চেক এবং কনফিগারেশন
          KEYSTORE_PATH=$SOURCE_DIR/android/app/nettumi.keystore
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=%s\n' "$KEYSTORE_PATH" > $SOURCE_DIR/android/key.properties
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_SDK_PATH" "$ANDROID_SDK_ROOT" > $SOURCE_DIR/android/local.properties

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build Signed APK (Auto-solving version issues)
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          # বিল্ড করার সময় যদি ভার্সন এরর আসে তবে এটি লেটেস্ট সাপোর্ট খুজবে
          flutter build apk --release --build-name=2.0.0 --build-number=2 --no-shrink --no-pub

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-v2-APK
          path: ${{ env.SOURCE_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Debug On Failure
        if: failure()
        run: |
          echo "=== Displaying pubspec.yaml content for debugging ==="
          cat ${{ env.SOURCE_DIR }}/pubspec.yaml
          echo "=== Gradle Error Details ==="
          cd ${{ env.SOURCE_DIR }}/android && ./gradlew assembleRelease --stacktrace 2>&1 | tail -100
