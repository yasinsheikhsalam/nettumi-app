name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter (Fast & Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: Extract Project
        run: |
          unzip -o Nettumi-Adda-Source.zip -d extracted
          unzip -o nettumi-keystore.zip
          mv *.keystore nettumi.keystore || true

      - name: Configure Signing
        run: |
          mkdir -p extracted/nettumi_adda_full/android/app/
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/nettumi.keystore
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > extracted/nettumi_adda_full/android/key.properties

      - name: Auto-Fix Dependencies & Environment
        working-directory: extracted/nettumi_adda_full
        run: |
          # যেকোনো ক্যাশ এরর দূর করতে ক্লিন করা
          flutter clean
          
          # পাইথন স্ক্রিপ্ট দিয়ে ভার্সন কনফ্লিক্ট ঠিক করা
          python3 - << 'PYEOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          # প্যাকেজ ভার্সন 'any' করে দেওয়া যাতে অটোমেটিক বেস্ট ভার্সন নেয়
          packages = ['intl', 'custom_lint', 'riverpod_lint', 'easy_localization', 'flutter_lints']
          for pkg in packages:
              content = re.sub(f'{pkg}:.*', f'{pkg}: any', content)
          
          if 'dependency_overrides:' not in content:
              content += '\ndependency_overrides:\n  intl: any\n  custom_lint: any\n'
          
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print('Pubspec auto-fixed!')
          PYEOF
          
          # ডিপেন্ডেন্সি আপডেট এবং ডাউনলোড
          flutter pub upgrade --major-versions
          flutter pub get

      - name: Build Signed APK
        working-directory: extracted/nettumi_adda_full
        env:
          # ফোর্সব্যালো ভাবে অ্যান্ড্রয়েড এসডিকে পাথ সেট করা
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # কোনো আইকন বা ফন্ট মিসিং থাকলে যেন বিল্ড না থামে
          flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/*.apk
