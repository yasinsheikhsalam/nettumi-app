name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          # লেটেস্ট এসডিকে ব্যবহার করা হয়েছে যাতে ডার্ট ভার্সন এরর না আসে
          channel: 'stable'

      - name: Prepare Files and Keystore
        run: |
          unzip -o Nettumi-Adda-Source.zip -d extracted
          unzip -o nettumi-keystore.zip
          mv *.keystore nettumi.keystore || true
          mkdir -p extracted/nettumi_adda_full/android/app/
          cp nettumi.keystore extracted/nettumi_adda_full/android/app/

      - name: Configure Keystore
        run: |
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > extracted/nettumi_adda_full/android/key.properties

      - name: Auto-Fix Dependencies
        working-directory: extracted/nettumi_adda_full
        run: |
          flutter clean
          # সমস্যাযুক্ত প্যাকেজগুলোর ভার্সন অটোমেটিক অ্যাডজাস্ট করার চেষ্টা করবে
          flutter pub get
          flutter pub upgrade --major-versions || echo "Trying to continue despite minor version mismatch..."

      - name: Build Signed APK (Force Mode)
        working-directory: extracted/nettumi_adda_full
        run: |
          # --no-tree-shake-icons ব্যবহার করা হয়েছে ফন্ট বা আইকন এরর এড়াতে
          flutter build apk --release --no-shrink --no-tree-shake-icons --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
