name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Unzip Source Code
        run: unzip Nettumi-Adda-Source.zip -d extracted

      - name: Flutter pub get
        working-directory: extracted/nettumi_adda_full
        run: flutter pub get

      - name: Build APK
        working-directory: extracted/nettumi_adda_full
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          path: extracted/nettumi_adda_full/build/app/outputs/flutter-apk/app-release.apk
