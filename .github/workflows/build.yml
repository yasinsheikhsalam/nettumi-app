name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract and Organize
        run: |
          # জিপ ফাইল আনজিপ করা
          unzip Nettumi-Android-Fixed.zip
          
          # প্রজেক্টের আসল ফোল্ডার খুঁজে বের করা
          PROJ_DIR=$(find . -name "build.gradle" -exec dirname {} + | head -n 1)
          
          # সব ফাইল মেইন ডিরেক্টরিতে মুভ করা যেন কনফিগারেশন এরর না হয়
          cp -r $PROJ_DIR/* . || true
          
          # জিপ ফাইল এবং অপ্রয়োজনীয় ফোল্ডার মুছে ফেলা যেন ক্লিন থাকে
          rm Nettumi-Android-Fixed.zip || true
          
          # Gradle Wrapper JAR ডাউনলোড করা
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew

      - name: Build with Clean
        # বিল্ড করার আগে ক্যাশে পরিষ্কার করা যেন আগের এররগুলো না আসে
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
