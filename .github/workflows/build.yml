name: God-Mode Autonomous Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Prepare Workspace
        run: |
          sudo apt-get install -y unzip python3
          unzip -q Nettumi-Adda-Source-Fixed-v11.zip -d extracted || true
          unzip -q nettumi-keystore.zip -d keystore_out || true
          KS=$(find . -name "*.keystore" -o -name "*.jks" | head -1)
          mkdir -p extracted/SourceFixed/android/app
          [ -f "$KS" ] && cp "$KS" extracted/SourceFixed/android/app/nettumi.keystore || echo "Keystore missing"

      - name: Advanced Intelligence Healing Engine
        run: |
          cat > /tmp/god_fixer.py << 'EOF'
          import os, re, glob

          def smart_patch(file_path):
              if not os.path.exists(file_path) or os.path.isdir(file_path): return
              try:
                  with open(file_path, 'r', errors='ignore') as f:
                      content = f.read()
                  
                  # ১. এনফোর্স অ্যান্ড্রয়েড এসডিকে ৩৪
                  content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
                  content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
                  content = re.sub(r'compileSdk\s+\d+', 'compileSdk 34', content)
                  
                  # ২. জাভা ১৭ কনফিগারেশন
                  content = re.sub(r'JavaVersion\.VERSION_1_[78]', 'JavaVersion.VERSION_17', content)
                  
                  # ৩. নির্ভুল মিডিয়া ডিপেন্ডেন্সি ইনজেকশন (আগের ভুলটি এখানে ফিক্স করা হয়েছে)
                  if 'dependencies {' in content and 'androidx.media:media' not in content:
                      content = re.sub(r'dependencies\s*\{', 'dependencies {\n    implementation "androidx.media:media:1.6.0"', content)
                  
                  # ৪. নেমস্পেস অটো-ফিক্স
                  if 'android {' in content and 'namespace' not in content:
                      manifest_path = os.path.join(os.path.dirname(file_path), 'src', 'main', 'AndroidManifest.xml')
                      if os.path.exists(manifest_path):
                          with open(manifest_path, 'r') as m:
                              pkg = re.search(r'package="([^"]+)"', m.read())
                              if pkg: content = content.replace('android {', f'android {{\n    namespace "{pkg.group(1)}"', 1)

                  with open(file_path, 'w') as f: f.write(content)
              except: pass

          # প্রজেক্ট ও ক্যাশে থাকা সব ডিপেন্ডেন্সি ফিক্স করা
          for target in ['./extracted', os.path.expanduser('~/.pub-cache')]:
              for f in glob.glob(f"{target}/**/build.gradle", recursive=True):
                  smart_patch(f)
          EOF

      - name: Ultimate Build Execution
        run: |
          cd extracted/SourceFixed
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # ৫টি ধাপে বিল্ড সমাধান করার চেষ্টা
          for attempt in {1..5}; do
            echo "--- Autonomous Attempt $attempt ---"
            
            # প্রোপার্টিজ ফিক্স
            printf "android.useAndroidX=true\nandroid.enableJetifier=true\n" > android/gradle.properties
            
            # প্রতিবার লুপে পাইথন ইঞ্জিন রান করবে
            python3 /tmp/god_fixer.py
            
            # লেভেল অনুযায়ী কঠোর ব্যবস্থা
            if [ $attempt -eq 2 ]; then
               rm -f pubspec.lock
               flutter pub get
            fi
            
            if [ $attempt -eq 3 ]; then
               # কনফ্লিক্ট এড়াতে ডিপেন্ডেন্সি ওভাররাইড
               printf "\ndependency_overrides:\n  intl: any\n  collection: any\n  meta: any\n" >> pubspec.yaml
               flutter pub get
            fi

            if flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation; then
              echo "BUILD SUCCESSFUL"
              cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/Nettumi-Final-Build.apk
              exit 0
            fi
            
            flutter clean
          done
          exit 1

      - name: Deliver APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-Release
          path: Nettumi-Final-Build.apk
