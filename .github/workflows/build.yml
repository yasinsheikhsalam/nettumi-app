name: Build Nettumi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Source Code
        run: unzip Nettumi-Android-Fixed.zip -d extracted

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          curl -L -o extracted/nettumi_project/Android/Sngine/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x extracted/nettumi_project/Android/Sngine/gradlew

      - name: Build Debug APK
        working-directory: extracted/nettumi_project/Android/Sngine
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: extracted/nettumi_project/Android/Sngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30      - name: Build Debug APK
        working-directory: extracted/nettumi_project/Android/Sngine
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Debug-APK
          path: extracted/nettumi_project/Android/Sngine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
