name: Build Nettumi Adda APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Extract Project
        run: |
          # জিপ ফাইলটি ঠিকমতো এক্সট্র্যাক্ট করা
          unzip -q Nettumi-Adda-Source-Fixed.zip -d extracted
          # যদি কি-স্টোর ফাইলটি মেইন ডিরেক্টরিতে থাকে তবে সেটি অ্যাপ ফোল্ডারে কপি করা
          find extracted -name "nettumi.keystore" -exec cp {} . \; || true

      - name: Configure Signing
        run: |
          # প্রোজেক্টের ভেতর android/app ফোল্ডারটি খুঁজে বের করা
          APP_DIR=$(find extracted -name "android" -type d | head -n 1)/app
          cp nettumi.keystore "$APP_DIR/nettumi.keystore" || echo "Keystore not found, skipping copy"
          
          # key.properties তৈরি করা (ডাইনামিক পাথ)
          PROPS_PATH=$(find extracted -name "android" -type d | head -n 1)/key.properties
          printf 'storePassword=Nettumi@123\nkeyPassword=Nettumi@123\nkeyAlias=nettumi_alias\nstoreFile=nettumi.keystore\n' > "$PROPS_PATH"

      - name: Auto-Fix & Pub Get
        run: |
          # প্রোজেক্টের মূল ফোল্ডার খুঁজে বের করা (যেখানে pubspec.yaml আছে)
          PROJECT_ROOT=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          
          # কমন এরর ফিক্স করতে ক্লিন করা
          flutter clean
          
          # পাইথন দিয়ে ইনকম্প্যাটিবল ভার্সন অটো-ফিক্স করা
          python3 - << 'PYEOF'
          import re, os
          path = 'pubspec.yaml'
          with open(path, 'r') as f: content = f.read()
          # ভার্সন কনফ্লিক্ট এড়াতে any ব্যবহার
          packages = ['intl', 'custom_lint', 'riverpod_lint', 'easy_localization']
          for pkg in packages:
              content = re.sub(f'{pkg}:.*', f'{pkg}: any', content)
          with open(path, 'w') as f: f.write(content)
          PYEOF
          
          flutter pub get

      - name: Build Signed APK
        run: |
          PROJECT_ROOT=$(find extracted -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          # বিল্ড কমান্ড (বড় ধরণের এররগুলো ইগনোর করার জন্য ফ্ল্যাগসহ)
          flutter build apk --release --build-name=1.0.0 --build-number=1 --no-shrink --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nettumi-Adda-APK
          # ওয়াইল্ডকার্ড (*) ব্যবহার করা হয়েছে যাতে ফাইল যেখানেই তৈরি হোক খুঁজে পায়
          path: extracted/**/build/app/outputs/flutter-apk/*.apk
